map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name home.local dashy.home.local vscode.home.local portainer.home.local glances.home.local nextcloud.home.local jellyfin.home.local qbittorrent.home.local immich.home.local files.home.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name home.local;
    include /etc/nginx/snippets/ssl-common.conf;

    location = /ca/home-local-ca.crt {
        alias /etc/nginx/ca/home-local-ca.crt;
        types {}
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="home-local-ca.crt"' always;
        add_header Cache-Control "no-store" always;
    }

    location / {
        return 302 https://dashy.home.local$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dashy.home.local;
    include /etc/nginx/snippets/ssl-common.conf;

    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://dashy:8080;
    }
}

server {
    listen 443 ssl;
    server_name vscode.home.local;
